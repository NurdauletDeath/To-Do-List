<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo Task Manager</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app">
    <h1>ToDo Task Manager</h1>
    <p>Add your tasks and manage them step by step.</p>
    <section id="todo-app" aria-label="Todo app container">
      <form id="task-form" class="task-form" autocomplete="off">
        <label for="task-input">New task</label>
        <div class="task-form-row">
          <input id="task-input" name="task" type="text" placeholder="Write a task..." />
          <button type="submit">Add</button>
        </div>
      </form>
      <div id="task-filters" class="task-filters" aria-label="Task filters">
        <button type="button" class="filter-button is-active" data-filter="all">All</button>
        <button type="button" class="filter-button" data-filter="active">Active</button>
        <button type="button" class="filter-button" data-filter="completed">Completed</button>
      </div>
      <div class="task-actions">
        <button id="clear-completed" class="task-clear" type="button">Clear completed</button>
      </div>
      <ul id="task-list" class="task-list" aria-live="polite"></ul>
    </section>
  </main>
</body>
</html>
